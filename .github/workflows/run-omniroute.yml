name: Run OmniRoute

on:
  schedule:
    # Run every 6 hours to maintain near-continuous uptime
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Fetch all history so git log can determine the last commit timestamp for keepalive
          fetch-depth: 0

      - name: Auto-Keepalive Commit
        run: |
          # If keepalive.txt exists, check if last modification commit was > 6 days ago.
          # If so, push a new commit to keep the repository active.
          if [ -f keepalive.txt ]; then
            LAST_COMMIT_TIME=$(git log -1 --format=%ct -- keepalive.txt || echo 0)
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - LAST_COMMIT_TIME))
            
            if [ "$ELAPSED" -gt 518400 ]; then # 6 days in seconds
              echo "🕒 Keep-alive threshold reached (elapsed: $ELAPSEDs). Updating keepalive..."
              echo "Last updated: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" > keepalive.txt
              git config --local user.name "github-actions[bot]"
              git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add keepalive.txt
              git commit -m "chore: keep-alive repository activity [skip ci]" || exit 0
              git push
            else
              echo "✅ Keep-alive check passed (elapsed: $ELAPSEDs). No commit needed."
            fi
          else
            echo "⚠️ keepalive.txt not found. Creating it..."
            echo "Last updated: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" > keepalive.txt
            git config --local user.name "github-actions[bot]"
            git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add keepalive.txt
            git commit -m "chore: initialize keepalive [skip ci]" || exit 0
            git push
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run OmniRoute Service
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER_NAME: ${{ secrets.HF_USER_NAME }}
          HF_DATASET_NAME: ${{ secrets.HF_DATASET_NAME }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          STORAGE_ENCRYPTION_KEY: ${{ secrets.STORAGE_ENCRYPTION_KEY }}
          INITIAL_PASSWORD: ${{ secrets.INITIAL_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          BASE_URL: ${{ secrets.BASE_URL }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          SYNC_DELY: ${{ secrets.SYNC_DELY }}
          APP_LOG_TO_FILE: 'false'
          RUN_DURATION: 20700 # 5.45 hours in seconds
        run: |
          chmod +x start.sh
          ./start.sh
