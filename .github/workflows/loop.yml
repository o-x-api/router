name: 24/7 OmniRoute Docker Keep-Alive Loop

on:
  repository_dispatch:
    types: [loop_worker]
  workflow_dispatch:

jobs:
  run-docker-routing-service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Install Hugging Face CLI
        run: pip install huggingface_hub

      - name: Create Structure Directories
        run: |
          mkdir -p ${{ github.workspace }}/data
          mkdir -p ${{ github.workspace }}/config

      - name: Restore Data Layer from Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET: "${{ secrets.HF_USER_NAME }}/${{ secrets.HF_DATASET_NAME }}"
        run: |
          echo "[*] Downloading existing data layers from Hugging Face..."
          python3 -c "
          from huggingface_hub import snapshot_download
          import os
          try:
              snapshot_download(
                  repo_id=os.getenv('HF_DATASET'),
                  repo_type='dataset',
                  local_dir='${{ github.workspace }}/data',
                  token=os.getenv('HF_TOKEN')
              )
              print('[+] Data successfully restored.')
          except Exception as e:
              print(f'[!] Dataset not found or empty ({e}). Starting fresh.')
          "

      - name: Generate OmniRoute Configuration File
        run: |
          echo "[*] Injecting secrets into server.env structure..."
          cat << EOF > ${{ github.workspace }}/config/server.env
          INITIAL_PASSWORD="${{ secrets.INITIAL_PASSWORD }}"
          JWT_SECRET="${{ secrets.JWT_SECRET }}"
          API_KEY_SECRET="${{ secrets.API_KEY_SECRET }}"
          STORAGE_ENCRYPTION_KEY="${{ secrets.STORAGE_ENCRYPTION_KEY }}"
          PORT=20128
          BASE_URL="${{ secrets.BASE_URL }}"
          NEXT_PUBLIC_BASE_URL="${{ secrets.BASE_URL }}"
          EOF

      - name: Spin up OmniRoute and Cloudflare Containers
        run: |
          # Boot OmniRoute using the newly generated configuration mapping
          docker run -d \
            --name omniroute \
            --network host \
            -v ${{ github.workspace }}/data:/app/data \
            -v ${{ github.workspace }}/config/server.env:/root/.omniroute/server.env \
            diegosouzapw/omniroute:latest

          docker run -d \
            --name cloudflared \
            --network host \
            cloudflare/cloudflared:latest \
            tunnel run --token "${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}"
            
      - name: Background Auto-Sync Loop (Custom Secret Delay)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET: "${{ secrets.HF_USER_NAME }}/${{ secrets.HF_DATASET_NAME }}"
          SYNC_DELAY_SEC: ${{ secrets.SYNC_DELY || '600' }}
        run: |
          echo "[*] Launching real-time background backup synchronization daemon..."
          echo "[*] Delay set to: $SYNC_DELAY_SEC seconds."
          
          python3 -c "
          from huggingface_hub import HfApi
          import os, time
          api = HfApi(token=os.getenv('HF_TOKEN'))
          repo = os.getenv('HF_DATASET')
          delay = int(os.getenv('SYNC_DELAY_SEC', 600))
          
          start_time = time.time()
          max_duration = 19800 
          
          while (time.time() - start_time) < max_duration:
              time.sleep(delay)
              print(f'[*] Background Sync: Archiving current state changes upstream after {delay}s...')
              try:
                  api.create_repo(repo_id=repo, repo_type='dataset', exist_ok=True, private=True)
                  api.upload_folder(
                      folder_path='${{ github.workspace }}/data',
                      repo_id=repo,
                      repo_type='dataset',
                      commit_message='OmniRoute automated background auto-sync snapshot'
                  )
                  print('[+] Background Sync: Successful.')
              except Exception as e:
                  print(f'[!] Background Sync Failed: {e}')
          " &
          SYNC_PID=$!
          echo "SYNC_DAEMON_PID=$SYNC_PID" >> $GITHUB_ENV

      - name: Keep Runner Alive & Wait for Lifecycle Limit
        run: |
          echo "[*] Production environments stable. Running core block for 5.5 hours..."
          sleep 19800

      - name: Gracefully Shut Down Containers
        run: |
          echo "[*] Stopping network listeners and collecting state snapshots..."
          docker stop -t 40 omniroute
          docker stop cloudflared
          kill -9 ${{ env.SYNC_DAEMON_PID }} || true

      - name: Final Backup Data State
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET: "${{ secrets.HF_USER_NAME }}/${{ secrets.HF_DATASET_NAME }}"
        run: |
          echo "[*] Archiving definitive structural dump parameters..."
          python3 -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi(token=os.getenv('HF_TOKEN'))
          repo = os.getenv('HF_DATASET')
          try:
              api.create_repo(repo_id=repo, repo_type='dataset', exist_ok=True, private=True)
              api.upload_folder(
                  folder_path='${{ github.workspace }}/data',
                  repo_id=repo,
                  repo_type='dataset',
                  commit_message='Final OmniRoute cycle state backup'
              )
              print('[+] Definitive upstream backup sequence completed.')
          except Exception as e:
              print(f'[!] Final Sync Failure: {e}')
          "

      - name: Trigger Next Loop Execution Cycle
        run: |
          echo "[*] Dispatching worker event hook to sustain 24/7 lifecycle..."
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "loop_worker"}'
