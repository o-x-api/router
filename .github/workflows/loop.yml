name: 24/7 OmniRoute Keep-Alive Loop

on:
  repository_dispatch:
    types: [loop_worker]
  workflow_dispatch:

jobs:
  run-container-service:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Runtime Dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Cloudflare Tunnel Client
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          rm cloudflared.deb

      - name: Make Script Executable
        run: chmod +x entrypoint.py

      - name: Run Automated Sync Environment
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # Dynamically stitches username and dataset name together for entrypoint.py
          HF_DATASET_NAME: "${{ secrets.HF_USER_NAME }}/${{ secrets.HF_DATASET_NAME }}"
          OMNIROUT_DATA_DIR: ${{ github.workspace }}/data
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p $OMNIROUT_DATA_DIR
          
          # 1. Start the OmniRoute application via our sync wrapper in the background
          python3 entrypoint.py &
          APP_PID=$!
          
          # 2. Fire up the Cloudflare Tunnel linked to your secure token
          # Note: Change the port '3000' here if OmniRoute listens on a different internal port
          cloudflared tunnel --no-autoupdate run --token "${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}" &
          TUNNEL_PID=$!
          
          # 3. Keep running for 5.5 hours before restarting the cycle
          sleep 19800
          
          echo "[*] 5.5 Hours reached. Gracefully stopping to sync state..."
          kill -15 $APP_PID
          kill -15 $TUNNEL_PID
          wait $APP_PID

          echo "[*] Triggering next cycle..."
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "loop_worker"}'
